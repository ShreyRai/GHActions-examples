name: Second workflow
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  issues:
    types: opened
env:
  TEST_VAR: thisIsExampleVarWorkflow
  MY_USER: ${{ vars.MY_USER }}
  MY_ENV_SECRET: ${{ secrets.MY_ENV_SECRET }}
jobs:
  Script-1:
    runs-on: ubuntu-latest
    environment: dev
    outputs: 
      statement: ${{ steps.step3.outputs.statement }}
    env:
      TEST_VAR_1: JobWorkflowVar
    steps: 
    - name: Checkout step
      uses: actions/checkout@v4  
    - name: Job Starts
      run: echo "-------------- JOB BEGINS!-----------"
    - name: Script 01 executing!
      id: step3
      run: |
        bash ./Scripts/script01.sh
        cat file01.txt
        echo "statement=ghjkhasduh@344342^342ehsu" >> $GITHUB_OUTPUT
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: imp-file
        path: file01.txt
    - name: Printing vars
      run: |
        echo "$TEST_VAR"
        echo "$TEST_VAR_1"
        echo "$MY_USER"
        echo "$MY_ENV_SECRET" #wrong command for step failure

        
    - name: Printing vars - check point
      if: success()
      run: echo "Vars are printed"
    - name: Job accomplished step
      if: always()
      run: echo "-------------- JOB DONE!--------------"
  Job-p:
    runs-on: ubuntu-latest
    if: always()
    outputs:
      statement2: ${{ steps.parallel.outputs.value }}
    steps:
      - name: Parallel Job step
        id: parallel
        run: echo "value=Shazam123" >> $GITHUB_OUTPUT
  Script-2:
      needs: Script-1

      #if: failure() #this job should run only when script-1 job fails

    
      runs-on: ubuntu-latest
      steps: 
      - name: Checkout step
        uses: actions/checkout@v4  
      - name: Job Starts
        run: echo "-------------- JOB BEGINS!-----------"
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: imp-file
      - name: Script 01 executing!
        run: |
          export MY_VAR="${{ needs.Script-1.outputs.statement }}"
          bash ./Scripts/script02.sh
          cat file01.txt
      - name: Printing vars - job2 ###
        run: |
          echo "$TEST_VAR"
          echo "${{ secrets.MY_SECRET }}"    
      - name: Job accomplished step
        run: echo "-------------- JOB DONE!--------------"
  Job-3:
    runs-on: ubuntu-latest
    needs: Script-2
    if: ${{ github.ref == 'refs/heads/dev' }}

    steps:
      - name: Dummy echo
        run: echo "This will only be visible if you are on dev branch"
  Job-4:
    runs-on: ubuntu-latest
    needs: [Job-3, Job-p, Script-1 ]
    if: always()
    steps:
      - name: Collecting outputs
        run: echo "${{ needs.Job-p.outputs.statement2 }}" >> creds.txt
      - name: Value from Job1
        run: echo "${{ needs.Script-1.outputs.statement }}" >> creds.txt
      - name: Printing file
        run: cat creds.txt
  Job-5:
    runs-on: ubuntu-latest
    needs: Job-4
    if: always()
    steps:
      - name: checkout code
        uses: actions/checkout@v5
      - name: Print username
        uses: ./.github/actions/ssr-composite
        with: 
          name: Shrey-admin
        
        
        
