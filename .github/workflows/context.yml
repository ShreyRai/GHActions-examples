name: A matrix workflow
on: 
    push:
        branches:
            - matrix
jobs:
    Test:
        strategy:
            matrix: 
                os: [ubuntu-latest, ubuntu-24.04, ubuntu-22.04]
                python: [3.9, 3.10, 3.12]
                include:
                    - os: ubuntu-latest
                      python: 3.14
                exclude:
                    - os: ubuntu-22.04
                      python: 3.9
        runs-on: ${{ matrix.os }}
        
        steps:
            - name: --Version check--
              run: cat /etc/os*
            - name: --Python version check---
              run: echo "${{ matrix.python }}"
    
