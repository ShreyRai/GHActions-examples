name: Context Testing
on: 
    - push
jobs: 
    Workflow-context:
        runs-on: ubuntu-latest
        steps:
            - name: Context to logs
              env:
                GITHUB_CONTEXT: ${{ toJson(github) }}
              run: echo $GITHUB_CONTEXT 
    JOB-context:
        runs-on: ubuntu-latest
        steps:
            - name: Context to logs
              env:
                Job_CONTEXT: ${{ toJson(job) }}
              run: echo $Job_CONTEXT 
    Steps-context:
        runs-on: ubuntu-latest
        steps:
            - name: Context to logs
              env:
                STEPS_CONTEXT: ${{ toJson(steps) }}
              run: echo $STEPS_CONTEXT
    Runner-context:
        runs-on: ubuntu-latest
        needs: [JOB-context, Steps-context, Workflow-context]
        steps:
            - name: Context to logs
              env:
                RUN_CONTEXT: ${{ toJson(runner) }}
              run: echo $RUN_CONTEXT
            - name: Context to runner without json
              run: echo ${{ runner }}
            - name: github repo
              run: echo ${{ github.repository }}